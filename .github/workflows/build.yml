name: Build Flutter APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # 打 tag 时触发 Release 构建
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java (Flutter Android 构建需要)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 获取 Flutter 依赖
        working-directory: app
        run: flutter pub get

      - name: 分析代码
        working-directory: app
        run: flutter analyze --no-fatal-warnings

      - name: 构建 Debug APK
        working-directory: app
        run: flutter build apk --debug

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk

  # 打 tag 时构建正式版并创建 Release
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-apk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 获取 Flutter 依赖
        working-directory: app
        run: flutter pub get

      - name: 构建 Release APK (未签名)
        working-directory: app
        run: flutter build apk --release

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
